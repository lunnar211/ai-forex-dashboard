# Render Blueprint – deploy the full AI Forex Dashboard on Render.com
# Docs: https://render.com/docs/blueprint-spec
#
# Usage:
#   1. Fork / push this repo to GitHub.
#   2. Go to https://dashboard.render.com/blueprints and click "New Blueprint".
#   3. Connect your GitHub repo – Render will detect this file automatically.
#   4. Fill in the required environment variables (GROQ_API_KEY etc.) when prompted.
#   5. Click "Apply" – Render creates the database, Redis, backend, and frontend.

services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  - type: web
    name: ai-forex-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: forex-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: forex-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        sync: false
      # Admin credentials – set these in the Render dashboard after deploy
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      # Set your AI provider key(s) in the Render dashboard after deploy
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: TWELVE_DATA_API_KEY
        sync: false
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false

  # ── Frontend ─────────────────────────────────────────────────────────────────
  - type: web
    name: ai-forex-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: ai-forex-backend
          type: web
          property: host
          scheme: https
      - key: NODE_ENV
        value: production

  # ── Redis ─────────────────────────────────────────────────────────────────────
  - type: redis
    name: forex-redis
    plan: free
    ipAllowList: []

# ── PostgreSQL ──────────────────────────────────────────────────────────────────
databases:
  - name: forex-db
    plan: free
    databaseName: forex_db
    user: forex_user
