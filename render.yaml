# Render Blueprint – deploy the full AI Forex Dashboard on Render.com
# Docs: https://render.com/docs/blueprint-spec
#
# Usage:
#   1. Fork / push this repo to your GitHub account.
#   2. Go to https://dashboard.render.com/blueprints and click "New Blueprint Instance".
#   3. Fill in the required environment variables when prompted:
#        • ADMIN_EMAIL / ADMIN_PASSWORD  – admin panel login credentials
#        • GROQ_API_KEY (or any other AI key)  – at least one must be set
#   4. Click "Apply" – Render automatically creates the database, Redis, backend, and frontend.
#
# Variables you do NOT need to set manually (all auto-linked):
#   • DATABASE_URL      – auto-linked to the postgres-db instance
#   • REDIS_URL         – auto-linked to the redis instance
#   • JWT_SECRET        – auto-generated secure random string
#   • CORS_ORIGIN       – auto-set to the frontend service URL
#   • NEXT_PUBLIC_API_URL – auto-set to the backend service URL
#
# All infrastructure (PostgreSQL, Redis) is provisioned and linked automatically.
# No need to create external services or manually copy-paste any service URLs.

databases:
  - name: forex-db
    plan: free
    databaseName: forex_db
    user: forex_user

services:
  - type: redis
    name: forex-redis
    plan: free
    ipAllowList: []           # empty list = no public access; backend reaches Redis via Render's private network

  - type: web
    name: ai-forex-backend
    runtime: node
    rootDir: ./backend
    buildCommand: npm ci --omit=dev
    startCommand: node src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: forex-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: forex-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false           # Required: admin panel login email
      - key: ADMIN_PASSWORD
        sync: false           # Required: admin panel login password
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false           # At least one AI key is required
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: TWELVE_DATA_API_KEY
        sync: false           # Optional: real forex data; uses mock data if not set
      - key: CORS_ORIGIN
        fromService:
          type: web
          name: ai-forex-frontend
          property: url          # auto-set to https://ai-forex-frontend.onrender.com

  - type: web
    name: ai-forex-frontend
    runtime: node
    rootDir: ./frontend
    # NEXT_PUBLIC_API_URL is auto-wired below from the backend service URL so
    # Next.js can bake it into the JavaScript bundle during `npm run build`.
    # Do NOT include a trailing slash in any manual override.
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: ai-forex-backend
          property: url          # auto-set to https://ai-forex-backend.onrender.com
