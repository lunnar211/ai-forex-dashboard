name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

# Prevent concurrent deployments to the same environment.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    # ── Required GitHub Secrets ────────────────────────────────────────────────
    # Go to: Settings → Secrets and variables → Actions → New repository secret
    #
    # Secret Name              Description
    # ──────────────────────── ─────────────────────────────────────────────────
    # DATABASE_URL             PostgreSQL connection string
    # JWT_SECRET               Long random string used to sign JWT tokens
    # GROQ_API_KEY             Groq AI API key  (at least one AI key required)
    # OPENAI_API_KEY           OpenAI API key   (optional)
    # GEMINI_API_KEY           Google Gemini API key  (optional)
    # TWELVE_DATA_API_KEY      Twelve Data forex API key  (optional)
    # REDIS_URL                Redis connection URL  (optional)
    # CORS_ORIGIN              Allowed CORS origin for the backend
    # NEXT_PUBLIC_API_URL      Public URL of the deployed backend API
    #
    # ── Provider-specific deployment secrets (add only what you need) ──────────
    # VERCEL_TOKEN             Vercel personal access token  (Vercel deployments)
    # RAILWAY_TOKEN            Railway API token  (Railway deployments)

    env:
      # ── Backend secrets ──────────────────────────────────────────────────────
      DATABASE_URL:          ${{ secrets.DATABASE_URL }}
      JWT_SECRET:            ${{ secrets.JWT_SECRET }}
      GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
      OPENAI_API_KEY:        ${{ secrets.OPENAI_API_KEY }}
      GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
      TWELVE_DATA_API_KEY:   ${{ secrets.TWELVE_DATA_API_KEY }}
      REDIS_URL:             ${{ secrets.REDIS_URL }}
      CORS_ORIGIN:           ${{ secrets.CORS_ORIGIN }}
      NODE_ENV:              production

      # ── Frontend secrets ─────────────────────────────────────────────────────
      NEXT_PUBLIC_API_URL:   ${{ secrets.NEXT_PUBLIC_API_URL }}

    steps:
      - uses: actions/checkout@v4

      # ── Backend ──────────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --omit=dev

      # ── Frontend ─────────────────────────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # ── Deploy ───────────────────────────────────────────────────────────────
      # Replace the steps below with your actual deployment commands.
      # Examples:
      #   • Railway / Render / Fly.io: use their official GitHub Actions
      #   • VPS: rsync + SSH into your server and restart pm2/docker
      #   • Vercel (frontend): use the Vercel GitHub Action
      #
      - name: Deploy backend
        run: |
          echo "Add your backend deployment command here."
          echo "Example: railway up --service backend"

      - name: Deploy frontend
        run: |
          echo "Add your frontend deployment command here."
          echo "Example: vercel --prod --token \${{ secrets.VERCEL_TOKEN }}"
