# Render Blueprint – deploy the full AI Forex Dashboard on Render.com
# Docs: https://render.com/docs/blueprint-spec
#
# Usage:
#   1. Fork / push this repo to your GitHub account.
#   2. Go to https://dashboard.render.com/blueprints and click "New Blueprint Instance".
#   3. Connect your GitHub repo – Render will detect this file automatically.
#   4. Fill in the required environment variables when prompted (ADMIN_EMAIL,
#      ADMIN_PASSWORD, and at least one AI key: GROQ_API_KEY / OPENAI_API_KEY / GEMINI_API_KEY).
#      JWT_SECRET is auto-generated by Render — no manual entry required.
#   5. Click "Apply" – Render automatically creates the database, Redis, backend, and frontend.
#
# All infrastructure (PostgreSQL, Redis) is provisioned and linked automatically.
# No need to create external services or set DATABASE_URL / REDIS_URL manually.

databases:
  - name: forex-db
    plan: free
    databaseName: forex_db
    user: forex_user

services:
  - type: redis
    name: forex-redis
    plan: free
    ipAllowList: []           # empty list = no public access; backend reaches Redis via Render's private network

  - type: web
    name: ai-forex-backend
    runtime: node
    rootDir: ./backend
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: forex-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: forex-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false           # Required: admin panel login email
      - key: ADMIN_PASSWORD
        sync: false           # Required: admin panel login password
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false           # At least one AI key is required
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: TWELVE_DATA_API_KEY
        sync: false           # Optional: real forex data; uses mock data if not set
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false           # Set to your frontend URL, e.g. https://ai-forex-frontend.onrender.com
      - key: AI_ENGINE_URL
        sync: false

  - type: web
    name: ai-forex-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false           # Set to your backend URL, e.g. https://ai-forex-backend.onrender.com
