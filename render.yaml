# Render Blueprint – deploy the full AI Forex Dashboard on Render.com
# Docs: https://render.com/docs/blueprint-spec
#
# Usage:
#   1. Fork / push this repo to GitHub.
#   2. Go to https://dashboard.render.com/blueprints and click "New Blueprint".
#   3. Connect your GitHub repo – Render will detect this file automatically.
#   4. Fill in the required environment variables (GROQ_API_KEY, DATABASE_URL, etc.)
#      when prompted, or add them in the Render dashboard after deploy.
#   5. Click "Apply" – Render creates the Redis cache, backend, and frontend.
#
# DATABASE:
#   This project uses an external Supabase PostgreSQL database.
#   Set DATABASE_URL to your Supabase connection string in the Render dashboard:
#     postgresql://postgres:[YOUR-PASSWORD]@db.<project-ref>.supabase.co:5432/postgres
#   Do NOT commit your actual password to the repository.

services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  - type: web
    name: ai-forex-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # Set this to your Supabase connection string in the Render dashboard.
      # Format: postgresql://postgres:[PASSWORD]@db.<ref>.supabase.co:5432/postgres
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          name: forex-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      # Admin credentials – REQUIRED for the /admin panel to work.
      # Set ADMIN_EMAIL and ADMIN_PASSWORD in the Render dashboard.
      # The backend seeds the admin account automatically on startup.
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      # Set your AI provider key(s) in the Render dashboard after deploy
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: TWELVE_DATA_API_KEY
        sync: false
      - key: CORS_ORIGIN
        fromService:
          name: ai-forex-frontend
          type: web
          envVarKey: RENDER_EXTERNAL_URL

  # ── Frontend ─────────────────────────────────────────────────────────────────
  - type: web
    name: ai-forex-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: ai-forex-backend
          type: web
          envVarKey: RENDER_EXTERNAL_URL

  # ── Redis ─────────────────────────────────────────────────────────────────────
  - type: redis
    name: forex-redis
    plan: free
    ipAllowList: []
