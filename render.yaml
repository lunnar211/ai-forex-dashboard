# Render Blueprint – deploy the full AI Forex Dashboard on Render.com
# Docs: https://render.com/docs/blueprint-spec
#
# Usage:
#   1. Fork / push this repo to GitHub.
#   2. Go to https://dashboard.render.com/blueprints and click "New Blueprint".
#   3. Connect your GitHub repo – Render will detect this file automatically.
#   4. Set up external services first (PostgreSQL, Redis) and note their connection URLs.
#   5. Fill in all required environment variables (DATABASE_URL, REDIS_URL, JWT_SECRET,
#      GROQ_API_KEY, etc.) when prompted in the Render dashboard.
#   6. Click "Apply" – Render creates the backend and frontend services.

services:
  - type: web
    name: ai-forex-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false           # Required: PostgreSQL connection string (external service)
      - key: REDIS_URL
        sync: false           # Required: Redis connection string (external service)
      - key: JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: TWELVE_DATA_API_KEY
        sync: false
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: AI_ENGINE_URL
        sync: false

  - type: web
    name: ai-forex-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false
